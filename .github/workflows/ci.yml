# PR checks: offline data-pipeline unit tests and web typecheck/build.
# Optional required checks: "Test data pipeline", "Build web app".
name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  test-data-pipeline:
    name: Test data pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        working-directory: src/data-pipeline
        run: bun test

  build-web:
    name: Build web app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        working-directory: src/web
        run: bun run build
