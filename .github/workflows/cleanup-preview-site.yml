# Removes the PR preview directory from gh-pages when a pull request closes.
name: Cleanup PR preview

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  cleanup-preview:
    name: Remove PR preview
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Remove preview directory
        run: |
          PREVIEW_DIR="previews/pr-${{ github.event.pull_request.number }}"
          if [ ! -d "$PREVIEW_DIR" ]; then
            echo "No preview directory at $PREVIEW_DIR — nothing to remove."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -rf "$PREVIEW_DIR"
          git commit -m "Remove preview for PR #${{ github.event.pull_request.number }}"
          git push
