# Deploys the map app to GitHub Pages on every push to main.
# Merging a data PR therefore automatically republishes the site with fresh
# data — that coupling is intentional (see docs/plans/phase-5-web-app.md).
#
# Production deploys to the gh-pages branch root. PR previews (preview-site.yml)
# deploy into previews/pr-<number>/ on the same branch; clean-exclude keeps
# those folders when main redeploys.
#
# Repo setting (one-time): Settings → Pages → Build and deployment → Source:
# Deploy from a branch → gh-pages / (root).
name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run build
        working-directory: src/web

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: src/web/dist
          clean: true
          clean-exclude: |
            previews/
          commit-message: Deploy site from main (${{ github.sha }})
