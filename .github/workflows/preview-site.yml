# Deploys a live PR preview to the gh-pages branch under previews/pr-<number>/.
#
# Each PR gets a GitHub Actions environment (preview-pr-<number>) so the
# deployment URL appears on the PR checks panel. A sticky comment links to the
# preview after every push.
#
# Repo setting: GitHub Pages must deploy from the gh-pages branch (root). See
# deploy-site.yml — production and previews share that branch.
name: Preview site

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy PR preview
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: preview-pr-${{ github.event.pull_request.number }}
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/previews/pr-${{ github.event.pull_request.number }}/
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app for preview
        run: bun run build
        working-directory: src/web
        env:
          GITHUB_PAGES_PREVIEW_PREFIX: previews/pr-${{ github.event.pull_request.number }}

      - name: Deploy preview to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: src/web/dist
          target-folder: previews/pr-${{ github.event.pull_request.number }}
          clean: false
          commit-message: Deploy preview for PR #${{ github.event.pull_request.number }} (${{ github.sha }})

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: site-preview
          message: |
            **Site preview** — [Open preview](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/previews/pr-${{ github.event.pull_request.number }}/)

            Deployed from commit ${{ github.event.pull_request.head.sha }}.
